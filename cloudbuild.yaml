substitutions:
  _REGION: asia-east1
  _AR_HOSTNAME: asia-east1-docker.pkg.dev
  _AR_REPOSITORY: truthshield
  _SERVICE_NAME: truthshield-api
  _QUEUE_DEPLOY_ENABLED: "true"
  _QUEUE_INSTANCE: "<QUEUE_VM_NAME>"
  _QUEUE_ZONE: asia-east1-a
  _QUEUE_ENV_FILE: /home/kyjita/codebase/truthshield-worker/.env
  _QUEUE_CONTAINER_NAME: truthshield-worker
  _QUEUE_DOCKER_NETWORK: "__SET_ME_IN_TRIGGER__"
  _QUEUE_SSH_USER: <QUEUE_SSH_USER>

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -lc
      - |
        if [[ "${_QUEUE_DEPLOY_ENABLED}" != "true" ]]; then
          echo "Queue host deploy disabled."
          exit 0
        fi
        if [[ -z "${_QUEUE_INSTANCE}" || "${_QUEUE_INSTANCE}" == "__SET_ME__" ]]; then
          echo "_QUEUE_INSTANCE is required when _QUEUE_DEPLOY_ENABLED=true" >&2
          exit 1
        fi

        IMAGE="${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}"
        SSH_TARGET="${_QUEUE_INSTANCE}"
        if [[ -n "${_QUEUE_SSH_USER}" ]]; then
          SSH_TARGET="${_QUEUE_SSH_USER}@${_QUEUE_INSTANCE}"
        fi

        gcloud compute scp deploy/queue-image-deploy.sh "$$SSH_TARGET:/tmp/truthshield-queue-image-deploy.sh" \
          --zone="${_QUEUE_ZONE}" \
          --quiet
        gcloud compute ssh "$$SSH_TARGET" \
          --zone="${_QUEUE_ZONE}" \
          --quiet \
          --command="chmod +x /tmp/truthshield-queue-image-deploy.sh && IMAGE='$${IMAGE}' ENV_FILE='${_QUEUE_ENV_FILE}' CONTAINER_NAME='${_QUEUE_CONTAINER_NAME}' DOCKER_NETWORK='${_QUEUE_DOCKER_NETWORK}' /tmp/truthshield-queue-image-deploy.sh"

images:
  - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}

options:
  logging: CLOUD_LOGGING_ONLY
